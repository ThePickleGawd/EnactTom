defaults:
  - /llm@plan_config.llm: openai_chat
  - /instruct@plan_config.instruct: enacttom_agent

_target_: 'habitat_llm.planner.LLMPlanner'
_recursive_: False
_partial_: True

plan_config:
    replanning_threshold: 20 # max number of times the LLM is allowed to plan to finish the task (reduced for debugging)
    planning_mode: "cot"
    constrained_generation: False
    example_type: "react"
    centralized: False
    objects_response: False
    objects_response_include_states: False
