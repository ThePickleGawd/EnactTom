# @package _global_

# Three identical Spot robots, each with head, arm, and jaw cameras.
defaults:
  - /habitat: habitat_config_base
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_0: rgbd_head_rgbd_arm_rgbd_jaw_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_1: rgbd_head_rgbd_arm_rgbd_jaw_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_2: rgbd_head_rgbd_arm_rgbd_jaw_agent_vis
  - /habitat_conf/dataset: enacttom_hssd

  - _self_

habitat:
  gym:
    obs_keys:
      # Agent 0
      - agent_0_third_rgb
      - agent_0_articulated_agent_arm_depth
      - agent_0_articulated_agent_arm_rgb
      - agent_0_articulated_agent_arm_panoptic
      - agent_0_head_depth
      - agent_0_head_rgb
      - agent_0_head_panoptic
      - agent_0_relative_resting_position
      - agent_0_joint
      - agent_0_ee_pos
      - agent_0_is_holding
      - agent_0_articulated_agent_jaw_rgb
      - agent_0_articulated_agent_jaw_depth
      - agent_0_articulated_agent_jaw_panoptic

      # Agent 1
      - agent_1_third_rgb
      - agent_1_articulated_agent_arm_depth
      - agent_1_articulated_agent_arm_rgb
      - agent_1_articulated_agent_arm_panoptic
      - agent_1_head_depth
      - agent_1_head_rgb
      - agent_1_head_panoptic
      - agent_1_relative_resting_position
      - agent_1_joint
      - agent_1_ee_pos
      - agent_1_is_holding
      - agent_1_articulated_agent_jaw_rgb
      - agent_1_articulated_agent_jaw_depth
      - agent_1_articulated_agent_jaw_panoptic

      # Agent 2
      - agent_2_third_rgb
      - agent_2_articulated_agent_arm_depth
      - agent_2_articulated_agent_arm_rgb
      - agent_2_articulated_agent_arm_panoptic
      - agent_2_head_depth
      - agent_2_head_rgb
      - agent_2_head_panoptic
      - agent_2_relative_resting_position
      - agent_2_joint
      - agent_2_ee_pos
      - agent_2_is_holding
      - agent_2_articulated_agent_jaw_rgb
      - agent_2_articulated_agent_jaw_depth
      - agent_2_articulated_agent_jaw_panoptic

  environment:
    max_episode_steps: 20000
  simulator:
    type: EnactToMSim-v0
    additional_object_paths:
      - "data/objects/ycb/configs/"
      - "data/objects_ovmm/train_val/ai2thorhab/configs/objects"
      - "data/objects_ovmm/train_val/amazon_berkeley/configs"
      - "data/objects_ovmm/train_val/google_scanned/configs"
      - "data/objects_ovmm/train_val/hssd/configs/objects"
    concur_render: False
    auto_sleep: True
    agents:
      agent_0:
        radius: 0.3
        articulated_agent_urdf: ./data/robot_variants/hab_spot_arm/urdf/hab_spot_arm_agent_0_scarlet.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
      agent_1:
        radius: 0.3
        articulated_agent_urdf: ./data/robot_variants/hab_spot_arm/urdf/hab_spot_arm_agent_1_cobalt.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
      agent_2:
        radius: 0.3
        articulated_agent_urdf: ./data/robot_variants/hab_spot_arm/urdf/hab_spot_arm_agent_2_emerald.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
    kinematic_mode: True
    step_physics: False
    habitat_sim_v0:
      allow_sliding: True
      enable_physics: True
