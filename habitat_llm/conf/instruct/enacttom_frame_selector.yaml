prompt: |-
    You are selecting first-person images for an embodied EnactToM agent.

    Review the acting-agent context and the candidate frames attached below.
    Choose the {min_frames} to {max_frames} most decision-relevant frames for the next action.

    Acting-agent context:
    {context}

    Task instruction:
    {instruction}

    Return exactly one line in this format:
    SELECTED_FRAMES: frame_id_1, frame_id_2
